name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-based page dates

      - name: Clone Quartz v4
        run: git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git quartz-build

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: quartz-build

      - name: Copy Quartz config
        run: |
          cp quartz.config.ts quartz-build/quartz.config.ts
          cp quartz.layout.ts quartz-build/quartz.layout.ts

      - name: Copy wiki content
        run: cp -r wiki quartz-build/content

      - name: Build
        run: npx quartz build
        working-directory: quartz-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
